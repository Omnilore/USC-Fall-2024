name: Build and Deploy to EC2

on:
  push:
    branches:
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run build

      - name: Prepare deploy bundle
        run: |
          rm -rf deploy_bundle
          mkdir deploy_bundle

          cp -r .next deploy_bundle/
          [ -d public ] && cp -r public deploy_bundle/
          [ -f package.json ] && cp package.json deploy_bundle/
          [ -f package-lock.json ] && cp package-lock.json deploy_bundle/
          [ -f next.config.js ] && cp next.config.js deploy_bundle/
          [ -f next.config.mjs ] && cp next.config.mjs deploy_bundle/

      - name: Archive bundle
        run: tar -czf deploy.tar.gz deploy_bundle

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/deploy_key << 'EOF'
          ${{ secrets.EC2_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null
          ssh-keyscan -p ${{ secrets.EC2_PORT }} -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Upload build to EC2
        run: |
          scp -P ${{ secrets.EC2_PORT }} -i ~/.ssh/deploy_key deploy.tar.gz \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/deploy.tar.gz

      - name: Deploy on EC2
        run: |
          ssh -p ${{ secrets.EC2_PORT }} -i ~/.ssh/deploy_key \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
              set -e

              APP_DIR="/home/ec2-user/app"

              mkdir -p "$APP_DIR"
              cd "$APP_DIR"

              rm -rf deploy_bundle
              tar -xzf /tmp/deploy.tar.gz

              rsync -av deploy_bundle/. ./
              rm -rf deploy_bundle
              rm -f /tmp/deploy.tar.gz

              npm ci --omit=dev

              if pm2 describe dbtest > /dev/null 2>&1; then
                pm2 restart dbtest
              else
                pm2 start npm --name dbtest -- start
              fi

              pm2 save
          EOF
